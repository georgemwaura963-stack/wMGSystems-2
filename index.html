<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Stentor Ent Ltd.</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;900&display=swap');

:root {
  --bg-primary:#ffffff; --bg-secondary:#f7f9fa;
  --text-primary:#111827; --text-secondary:#4b5563; --text-tertiary:#9ca3af;
  --border-color:#e5e7eb; --input-bg:#f9fafb; --input-border:#d1d5db;
  --success-color:#10b981; --error-color:#ef4444;
  --theme-chan:#10b981;
  --theme-carr:#3b82f6;
  --shadow-color:rgba(0,0,0,0.1);
  --label-text:#6b7280;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color:var(--text-primary); 
  min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding: env(safe-area-inset-top, 16px) 12px env(safe-area-inset-bottom, 16px);
  overflow-y:auto; -webkit-overflow-scrolling:touch; transition: background 0.6s ease;
}

/* Home Screen Gradient Background & Modern Font */
body.theme-hub { background: linear-gradient(135deg, #059669 0%, #2563eb 100%); font-family: 'Nunito', sans-serif; }
body.theme-chandarana { background-color: var(--theme-chan); }
body.theme-carrefour { background-color: var(--theme-carr); --success-color:#3b82f6; }

.view-section { display: none; width: 100%; max-width: 440px; flex-direction: column; align-items: center; }
.view-section.active { display: flex; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Shared Container */
.container {
  width: 100%; background:var(--bg-primary); padding:24px 22px;
  border-radius:24px; box-shadow:0 15px 35px var(--shadow-color); position:relative; overflow:hidden;
}
.scrollable-container { max-height: 85vh; overflow-y: auto; overflow-x: hidden; padding-bottom: 30px; }

/* --- HOME HUB STYLES --- */
.hub-logo { font-size: 34px; font-weight: 900; color: #fff; margin-bottom: 40px; letter-spacing: 1px; text-transform: uppercase; text-align: center; text-shadow: 0 4px 10px rgba(0,0,0,0.2); }
.menu-btn {
  width: 100%; background: var(--bg-primary); color: var(--text-primary);
  border: none; border-radius: 20px; padding: 30px 20px; margin-bottom: 20px;
  display: flex; align-items: center; justify-content: center; gap: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15); cursor: pointer; transition: transform 0.1s;
}
.menu-btn:active { transform: scale(0.96); }
.menu-btn .icon { font-size: 36px; }
.menu-btn .text { font-size: 24px; font-weight: 900; font-family: 'Nunito', sans-serif;}

/* Navigation Back Bar */
.back-bar { width: 100%; display: flex; align-items: center; margin-bottom: 20px; color: #fff; font-weight: 700; cursor: pointer; font-size: 16px; font-family: 'Nunito', sans-serif;}

/* --- FORM & INPUT STYLES --- */
label { font-weight:800; font-size:12px; display:block; margin-bottom:6px; margin-top:12px; color:var(--label-text); text-transform:uppercase; letter-spacing:0.5px; }
input:not([type="checkbox"]):not([type="radio"]),select,textarea {
  width:100%; padding:14px; border-radius:12px; border:1px solid var(--input-border); font-size:15px; background:var(--input-bg);
  color:var(--text-primary); transition:all 0.2s; -webkit-appearance:none; outline:none; font-family: inherit; font-weight: 600;
}
input:read-only { background: #e5e7eb; color: var(--text-secondary); }
input:focus,select:focus,textarea:focus { border-color:#111827; box-shadow:0 0 0 3px rgba(0,0,0,0.05); }

.btn-primary {
  width:100%; height:50px; border-radius:12px; border:none; font-size:16px; font-weight:800; margin-top: 24px;
  background:#111827; color:#fff; cursor:pointer; transition:transform 0.1s; display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-primary:active { transform:scale(0.97); }
.btn-primary:disabled { opacity:0.6; cursor:not-allowed; }

/* --- GRID TABLE (Sticky Headers & Tappable Circles) --- */
.section-title { font-size: 15px; font-weight: 800; color: var(--text-primary); margin: 28px 0 12px 0; border-bottom: 2px solid var(--border-color); padding-bottom: 4px; }
.table-container { 
  width: 100%; max-height: 380px; overflow: auto; 
  border: 1px solid var(--border-color); border-radius: 12px; -webkit-overflow-scrolling: touch; background: var(--bg-primary); 
}
table { width: 100%; border-collapse: separate; border-spacing: 0; text-align: center; }
th, td { padding: 8px 4px; border-bottom: 1px solid var(--border-color); border-right: 1px solid var(--border-color); }
th { 
  background: var(--bg-secondary); font-weight: 800; color: var(--text-secondary); font-size: 11px;
  position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 2px rgba(0,0,0,0.05);
}
td.flavor-name { 
  text-align: left; font-weight: 800; font-size: 11px; padding-left: 10px; white-space: nowrap;
  position: sticky; left: 0; background: var(--bg-primary); z-index: 11; border-right: 2px solid var(--border-color);
}
th:first-child { position: sticky; left: 0; top: 0; z-index: 12; background: var(--bg-secondary); border-right: 2px solid var(--border-color); }

/* Tappable Circle Inputs */
.circle-select {
  appearance: none; -webkit-appearance: none;
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--input-bg); border: 2px solid var(--input-border);
  color: var(--text-primary); font-weight: 800; font-size: 14px;
  text-align: center; text-align-last: center; padding: 0; cursor: pointer;
}
.circle-select.has-value { background: var(--theme-chan); color: #fff; border-color: var(--theme-chan); }
body.theme-carrefour .circle-select.has-value { background: var(--theme-carr); border-color: var(--theme-carr); }

/* --- CHIPS (Checkboxes) --- */
.chip-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.chip-label { cursor: pointer; display: inline-block; -webkit-tap-highlight-color: transparent; }
.chip-label input { display: none; }
.chip-span { display: inline-flex; align-items: center; background: var(--input-bg); border: 1px solid var(--input-border); padding: 10px 14px; border-radius: 50px; font-size: 13px; font-weight: 700; color: var(--text-secondary); transition: 0.2s; }
.chip-label input:checked + .chip-span { background: #111827; color: #fff; border-color: #111827; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }

/* --- MESSAGES --- */
.msg{ font-size:12px; font-weight:800; margin-top:6px; min-height:24px; color:var(--text-tertiary); display:flex; align-items:center;}
.msg.success{ color:var(--success-color); font-size:13px; } 
.msg.error { color:var(--error-color); }
.msg .dot{ display:inline-flex; justify-content:center; align-items:center; width:16px; height:16px; background:var(--success-color); border-radius:50%; margin-right:6px; flex-shrink:0; position:relative; }
.msg .dot::after{ content:''; position:absolute; top:45%; left:50%; width:3.5px; height:7px; border-right:2px solid #fff; border-bottom:2px solid #fff; transform:translate(-50%,-50%) rotate(45deg); }

/* Utilities */
.top-bar{display:flex;justify-content:center;margin-bottom:10px}
.terminal-pill-wrapper{ position:relative;display:inline-flex;background:var(--input-bg); border:1px solid var(--border-color);border-radius:50px;padding:4px;height:44px; box-shadow:inset 0 2px 4px rgba(0,0,0,0.04);align-items:center; }
.pill-slider{ position:absolute;top:4px;bottom:4px;left:4px;border-radius:50px; background:var(--dynamic-primary);box-shadow:0 2px 6px rgba(0,0,0,0.15); transition:all 0.35s cubic-bezier(0.25,1,0.5,1);z-index:1; }
.pill-btn{ position:relative;z-index:2;background:transparent;border:none; padding:0 18px;height:100%;font-size:14px;font-weight:800; color:var(--text-secondary);cursor:pointer;transition:color 0.2s ease; display:flex;align-items:center;justify-content:center; outline:none; -webkit-tap-highlight-color:transparent; }
.pill-btn.active{color:#fff;} 

/* Success Screens */
.success-screen { text-align: center; padding: 20px 0; display: none; flex-direction: column; align-items: center; }
.success-screen.active { display: flex; animation: bounceIn 0.4s ease; }
.circle-check { width: 80px; height: 80px; background: var(--success-color); color: #fff; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 16px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);}
@keyframes bounceIn{ 0%{transform:scale(0.9);opacity:0} 60%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }

/* Camera Overlay */
#videoContainerWrapper{ position:absolute; top:0; left:0; right:0; bottom:0; width:100%; height:100%; border-radius:24px; overflow:hidden; z-index:60; background-color: #000; transition: opacity 0.3s ease, transform 0.35s cubic-bezier(0.25, 1, 0.4, 1); transform: scale(0.95); opacity:0; pointer-events:none; }
#videoContainerWrapper.expanded{ pointer-events:auto; opacity:1; transform: scale(1); }
#cameraVideo{ position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; display:block; transform: scaleX(-1); opacity: 0; transition: opacity 0.4s ease; }
#cameraVideo.live { opacity: 1; }
#cameraBackdrop{ display:none;position:fixed;inset:0;z-index:59; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
#cameraBackdrop.show{ display:block; }
.camera-ui{ position:absolute;bottom:0;left:0;right:0; padding:20px; background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 100%); display:flex;align-items:center;justify-content:center; z-index:4; }
#captureBtn{ width:64px;height:64px;border-radius:50%; background:rgba(255,255,255,0.3);border:4px solid rgba(255,255,255,0.95); cursor:pointer;display:flex;align-items:center;justify-content:center; transition:transform 0.1s; opacity: 1; }
#captureBtn::after{content:'';width:48px;height:48px;background:#fff;border-radius:50%;transition:transform 0.1s}
#captureBtn:active{transform:scale(0.88)}
#closeCameraBtn{ position:absolute;top:16px;right:16px; width:36px;height:36px;border-radius:50%; background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.3); color:#fff;font-size:16px; cursor:pointer; display:flex;align-items:center;justify-content:center; z-index:6; }
.success-photo { width: 96px; height: 96px; object-fit: cover; border-radius: 50%; box-shadow: 0 0 0 4px var(--success-color); margin-bottom: 15px; }
</style>
</head>

<body class="theme-hub">

<script>
// 🛑 PASTE YOUR APPS SCRIPT URLS HERE 🛑
const ORDERS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwVy7MbFQmI6fVQM0ti52y05c0rc7-KvqUsU3Uq3WXzJ1CEqYP3vF0noIJbNtuL4nOT/exec";
const ATTENDANCE_SCRIPT_URL = "https://georgemwaura963-stack.github.io/wGMSystems-attendance-2/";

// ==========================================
// DYNAMIC DATA FETCHING LOGIC
// ==========================================
let PORTAL_DATA = {
  Chandarana: { staff: [], branches: [], loaded: false },
  Carrefour:  { staff: [], branches: [], loaded: false }
};

let activeStore = 'Chandarana'; // Tracks which terminal is open

function fetchSheetData(store) {
  if (PORTAL_DATA[store].loaded) {
    populateDropdowns(store);
    return;
  }

  // Set dropdowns to Loading State
  document.getElementById('o-branch').innerHTML = '<option value="">Loading Data...</option>';
  document.getElementById('a-branch').innerHTML = '<option value="">Loading Data...</option>';

  const terminalId = store.toLowerCase(); // 'chandarana' or 'carrefour'

  fetch(ATTENDANCE_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'getPortalData', terminal: terminalId })
  })
  .then(r => r.json())
  .then(res => {
    if (res.ok) {
      PORTAL_DATA[store].staff = res.data.staff || [];
      PORTAL_DATA[store].branches = res.data.branches || [];
      PORTAL_DATA[store].loaded = true;
      if (activeStore === store) populateDropdowns(store);
    } else {
      throw new Error("Failed to load data");
    }
  })
  .catch(err => {
    document.getElementById('o-branch').innerHTML = '<option value="">Offline - Refresh App</option>';
    document.getElementById('a-branch').innerHTML = '<option value="">Offline - Refresh App</option>';
  });
}

function populateDropdowns(store) {
  let options = '<option value="">Select Branch...</option>';
  PORTAL_DATA[store].branches.forEach(b => {
    if (b[0]) options += `<option value="${b[0]}">${b[0]}</option>`;
  });
  document.getElementById('o-branch').innerHTML = options;
  document.getElementById('a-branch').innerHTML = options;
}

// Reusable Staff Lookup
function lookupStaffId(val, msgId, store, nameInputId) {
  const msgDiv = document.getElementById(msgId);
  const nameInput = document.getElementById(nameInputId);
  
  if (val.length < 2) {
    msgDiv.innerHTML = ''; msgDiv.className = 'msg';
    if(nameInput) nameInput.value = '';
    return null;
  }

  const match = PORTAL_DATA[store].staff.find(s => String(s.id).trim() === val.trim());
  if (match) {
    if(nameInput) nameInput.value = match.name;
    msgDiv.innerHTML = `<span class="dot"></span> Welcome ${match.name}`;
    msgDiv.className = 'msg success';
    return match;
  } else {
    if(nameInput) nameInput.value = '';
    msgDiv.innerHTML = 'ID not found in database';
    msgDiv.className = 'msg error';
    return null;
  }
}
</script>


<!-- ==========================================
     VIEW 1: MAIN HUB MENU
=========================================== -->
<div id="view-menu" class="view-section active">
  <div class="hub-logo">Stentor Ent Ltd.</div>
  
  <button class="menu-btn" onclick="openOrder('Chandarana')">
    <div class="icon">🛒</div>
    <div class="text">Place Order</div>
  </button>

  <button class="menu-btn" onclick="openAttendance('Chandarana')">

  </button>
</div>


<!-- ==========================================
     VIEW 2: UNIFIED ORDER FORM
=========================================== -->
<div id="view-orders" class="view-section">
  <div class="back-bar" onclick="goHome()"><span class="back-icon">←</span> Back to Hub</div>
  
  <div class="container scrollable-container">
    <div class="top-bar">
      <div class="terminal-pill-wrapper">
        <div class="pill-slider" id="o-pillSlider"></div>
        <button class="pill-btn active" id="o-btn-Chandarana" type="button" onclick="switchTerminal('Chandarana', 'order')">Chandarana</button>
        <button class="pill-btn" id="o-btn-Carrefour" type="button" onclick="switchTerminal('Carrefour', 'order')">Carrefour</button>
      </div>
    </div>

    <form id="orderForm" onsubmit="submitOrder(event)">
      <div class="section-title">Staff Details</div>
      
      <label>Staff ID</label>
      <input type="tel" id="o-id" placeholder="Enter ID" required autocomplete="off" oninput="lookupStaffId(this.value, 'o-staffMsg', activeStore, 'o-name')">
      <div id="o-staffMsg" class="msg"></div>

      <label>Full Name</label>
      <input type="text" id="o-name" placeholder="Auto-fills from ID" required readonly>
      
      <div style="display:flex; gap:10px;">
        <div style="width: 50%;">
          <label>Phone No.</label>
          <input type="tel" id="o-phone" placeholder="07..." required>
        </div>
        <div style="width: 50%;">
          <label>Branch / Shop</label>
          <select id="o-branch" required><option value="">Select...</option></select>
        </div>
      </div>

      <div id="dynamicOrderContent"></div>

      <div class="section-title">Additional Notes</div>
      <textarea id="o-notes" rows="2" placeholder="Any special instructions..."></textarea>

      <button type="submit" class="btn-primary" id="orderSubmitBtn">Submit Order</button>
    </form>

    <div class="success-screen" id="orderSuccessScreen">
      <div class="circle-check">✓</div>
      <h2 style="margin-bottom:8px; font-weight:800;">Order Sent!</h2>
      <p style="color:var(--text-secondary); font-size:14px; margin-bottom:24px; font-weight:600;">Your order has been logged successfully.</p>
      <button class="btn-primary" onclick="goHome()">Back to Hub</button>
    </div>
  </div>
</div>


<!-- ==========================================
     VIEW 3: ATTENDANCE SYSTEM
=========================================== -->
<div id="view-attendance" class="view-section">
  <div class="back-bar" onclick="goHome()"><span class="back-icon">←</span> Back to Hub</div>

  <div class="container scrollable-container">
    <div id="mainForm">
      <div class="top-bar">
        <div class="terminal-pill-wrapper">
          <div class="pill-slider" id="pillSlider"></div>
          <button class="pill-btn active" id="btn-Chandarana" type="button" onclick="switchTerminal('Chandarana', 'attendance')">Chandarana</button>
          <button class="pill-btn" id="btn-Carrefour" type="button" onclick="switchTerminal('Carrefour', 'attendance')">Carrefour</button>
        </div>
      </div>

      <label>Branch</label>
      <select id="a-branch"><option value="">Select Branch...</option></select>
      
      <label>Staff ID</label>
      <input id="a-staffID" type="tel" placeholder="Enter ID" autocomplete="off" oninput="window.currentAttStaff = lookupStaffId(this.value, 'a-staffMsg', activeStore, null)">
      <div id="a-staffMsg" class="msg"></div>

      <div style="display:flex; gap:10px; margin-top:20px;">
        <button type="button" class="btn-primary" style="margin-top:0;" onclick="verifyGPS()">📍 Verify Location</button>
        <button type="button" class="btn-primary" style="margin-top:0; background:var(--text-secondary);" onclick="startCamera()">📸 Take Selfie</button>
      </div>
      <div id="gpsMsg" class="msg" style="justify-content:center;"></div>
      <div id="cameraMsg" class="msg" style="justify-content:center;"></div>

      <button type="button" class="btn-primary" style="margin-top:20px;" id="attSubmitBtn" onclick="submitAttendance()">Submit Attendance</button>
    </div>

    <div class="success-screen" id="attSuccessScreen">
      <img id="successPhoto" class="success-photo" src="">
      <h2 style="margin-bottom:8px; font-weight:800; color:var(--success-color);" id="attSuccessBadge">CLOCKED IN</h2>
      <p style="color:var(--text-secondary); font-size:14px; margin-bottom:24px; font-weight:800;" id="attSuccessName"></p>
      <button class="btn-primary" onclick="goHome()">Back to Hub</button>
    </div>
  </div>
</div>

<!-- Camera overlay -->
<div id="videoContainerWrapper">
  <video id="cameraVideo" autoplay playsinline muted></video>
  <button id="closeCameraBtn" onclick="stopCamera()">&#x2715;</button>
  <div class="camera-ui"><div id="captureBtn" onclick="capturePhoto()"></div></div>
</div>
<div id="cameraBackdrop" onclick="stopCamera()"></div>


<script>
// ==========================================
// NAVIGATION & MODULE LOGIC
// ==========================================
function hideAllViews() {
  document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
}

function goHome() {
  hideAllViews();
  document.body.className = 'theme-hub';
  document.getElementById('view-menu').classList.add('active');
  stopCamera();
}

function openOrder(store) {
  hideAllViews();
  document.getElementById('view-orders').classList.add('active');
  document.getElementById('orderForm').reset();
  document.getElementById('orderForm').style.display = 'block';
  document.getElementById('orderSuccessScreen').classList.remove('active');
  document.getElementById('o-staffMsg').innerHTML = '';
  switchTerminal(store, 'order');
}

function openAttendance(store) {
  hideAllViews();
  document.getElementById('view-attendance').classList.add('active');
  document.getElementById('mainForm').style.display = 'block';
  document.getElementById('attSuccessScreen').classList.remove('active');
  document.getElementById('a-staffID').value = '';
  document.getElementById('a-staffMsg').innerHTML = '';
  document.getElementById('gpsMsg').innerHTML = '';
  window.currentAttStaff = null;
  window.coords = null;
  window.photo = null;
  switchTerminal(store, 'attendance');
}

function switchTerminal(store, module) {
  activeStore = store;
  document.body.className = store === 'Chandarana' ? 'theme-chandarana' : 'theme-carrefour';
  
  // Update UI Pills dynamically based on the module active
  const prefix = module === 'order' ? 'o-' : '';
  document.getElementById(prefix + 'btn-Chandarana').classList.toggle('active', store === 'Chandarana');
  document.getElementById(prefix + 'btn-Carrefour').classList.toggle('active',  store === 'Carrefour');
  
  setTimeout(() => {
    const ab = document.querySelector(`.view-section.active .pill-btn.active`);
    const sl = document.getElementById(prefix + 'pillSlider');
    if (ab && sl) { sl.style.width = ab.offsetWidth + 'px'; sl.style.left = ab.offsetLeft + 'px'; }
  }, 50);

  // Clear inputs when switching
  if (module === 'order') {
    document.getElementById('o-id').value = ''; document.getElementById('o-name').value = ''; document.getElementById('o-staffMsg').innerHTML = '';
    renderDynamicOrderContent();
  } else {
    document.getElementById('a-staffID').value = ''; document.getElementById('a-staffMsg').innerHTML = '';
    window.currentAttStaff = null;
  }

  // Fetch or Load Database Options for Dropdowns
  fetchSheetData(store);
}

// ==========================================
// DYNAMIC ORDER RENDERING
// ==========================================
const JUICES = {
  Chandarana: ["ORANGE", "TROPICAL MIX", "MANGO", "PASSION", "APPLE GINGER", "TREE TOMATO", "PINEAPPLE MINT", "LIME & GINGER", "APPLEJUICE", "LIMEJUICE", "HIBISCUS", "TAMARIND", "ALOE VERA", "BEETROOT", "TANGERINE", "GINGER PLAIN", "CARROT"],
  Carrefour: ["ORANGE", "TROPICAL MIX", "MANGO", "PASSION", "APPLE GINGER", "TREE TOMATO", "PINEAPPLE MINT", "LIME & GINGER", "TAMARIND", "CARROT", "BEETROOT"]
};
const VOLUMES = ["3L", "5L", "10L", "15L", "20L", "25L", "30L"];

function createCircleOptions() {
  let opts = '<option value=""></option>';
  for(let i=1; i<=50; i++) opts += `<option value="${i}">${i}</option>`;
  return opts;
}

function renderDynamicOrderContent() {
  let html = `<div class="section-title">Juice Quantities</div>`;
  html += `<div class="table-container"><table><thead><tr><th>Flavor</th>`;
  VOLUMES.forEach(v => html += `<th>${v}</th>`);
  html += `</tr></thead><tbody>`;
  
  const circleOpts = createCircleOptions();
  JUICES[activeStore].forEach(flavor => {
    html += `<tr><td class="flavor-name">${flavor}</td>`;
    VOLUMES.forEach(v => {
      html += `<td><select class="circle-select juice-input" data-flavor="${flavor}" data-vol="${v}" onchange="this.classList.toggle('has-value', this.value !== '')">${circleOpts}</select></td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table></div>`;

  html += `<div class="section-title">Fresh Inputs</div><div class="chip-group">`;
  if(activeStore === 'Chandarana') {

// SUBMIT ORDERS
// ==========================================
async function submitOrder(e) {
  e.preventDefault();
  if(!document.getElementById('o-name').value) { alert("Please enter a valid Staff ID."); return; }
  
  const btn = document.getElementById('orderSubmitBtn');
  btn.disabled = true; btn.innerText = 'Submitting...';

  const freshVals = Array.from(document.querySelectorAll('.inp-fresh:checked')).map(el => el.value).join(', ');
  const bottleVals = Array.from(document.querySelectorAll('.inp-bottle:checked')).map(el => el.value).join(', ');
  const haccpVals = Array.from(document.querySelectorAll('.inp-haccp:checked')).map(el => el.value).join(', ');

  const payload = {
    "SHOP": document.getElementById('o-branch').value,
    [activeStore === 'Chandarana' ? "FULL NAME" : "FULL NAME (2 Names)"]: document.getElementById('o-name').value,
    "ID NO.": document.getElementById('o-id').value,
    "PHONE NO.": document.getElementById('o-phone').value,
    "FRESH INPUTS": freshVals,
    "BOTTLES": bottleVals,
    "HACCP SUPPLIES": haccpVals,
    "NOTES": document.getElementById('o-notes').value
  };

  const juicePrefix = activeStore === 'Chandarana' ? "JUICE (5 LITRES/3 LITRES)" : "JUICE (5 ITRES / 3 LITRES)";
  JUICES[activeStore].forEach(flavor => {
    let flavorKey = flavor;
    if (["TREE TOMATO", "HIBISCUS", "TAMARIND", "BEETROOT", "TANGERINE", "CARROT"].includes(flavor)) {
       flavorKey = activeStore === 'Chandarana' ? `${flavor} ` : flavor; 
    }
    let quantities = [];
    VOLUMES.forEach(v => {
      const input = document.querySelector(`.juice-input[data-flavor="${flavor}"][data-vol="${v}"]`);
      if(input && input.value) quantities.push(`${v}: ${input.value}`);
    });
    if(quantities.length > 0) payload[`${juicePrefix} [${flavorKey}]`] = quantities.join(', ');
  });

  try {
    await fetch(ORDERS_SCRIPT_URL, { method: "POST", body: JSON.stringify({ store: activeStore, payload: payload }) });
    document.getElementById('orderForm').style.display = 'none';
    document.getElementById('orderSuccessScreen').classList.add('active');
  } catch (error) {
    alert("Error sending order. Check connection.");
  }
  btn.disabled = false; btn.innerText = 'Submit Order';
}

// ==========================================
// ATTENDANCE SUBMISSION (Camera & GPS)
// ==========================================
window.coords = null; window.photo = null; window.currentAttStaff = null; window.videoStream = null;

function verifyGPS() {
  document.getElementById('gpsMsg').innerHTML = 'Locating...'; document.getElementById('gpsMsg').className = 'msg';
  navigator.geolocation.getCurrentPosition(
    pos => { window.coords = pos.coords; document.getElementById('gpsMsg').innerHTML = '<span class="dot"></span> Location Verified'; document.getElementById('gpsMsg').className = 'msg success'; },
    err => { document.getElementById('gpsMsg').innerHTML = 'GPS Failed - Enable Location'; document.getElementById('gpsMsg').className = 'msg error'; },
    {enableHighAccuracy:true, timeout:10000}
  );
}

function startCamera() {
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false }).then(stream => {
    window.videoStream = stream; const video = document.getElementById('cameraVideo'); video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play(); document.getElementById('videoContainerWrapper').classList.add('expanded');
      document.getElementById('cameraBackdrop').classList.add('show'); video.classList.add('live');
    };
  }).catch(err => { document.getElementById('cameraMsg').innerHTML = 'Camera blocked'; document.getElementById('cameraMsg').className = 'msg error'; });
}

function capturePhoto() {
  const video = document.getElementById('cameraVideo');
  const canvas = document.createElement('canvas'); canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d'); ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  window.photo = canvas.toDataURL('image/jpeg', 0.7);
  document.getElementById('successPhoto').src = window.photo;
  document.getElementById('cameraMsg').innerHTML = '<span class="dot"></span> Selfie Captured'; document.getElementById('cameraMsg').className = 'msg success';
  stopCamera();
}

function stopCamera() {
  document.getElementById('videoContainerWrapper').classList.remove('expanded');
  document.getElementById('cameraBackdrop').classList.remove('show');
  if (window.videoStream) { window.videoStream.getTracks().forEach(t => t.stop()); window.videoStream = null; }
}

function submitAttendance() {
  const branch = document.getElementById('a-branch').value;
  const staffObj = window.currentAttStaff;

  if(!branch) { alert("Please select a branch."); return; }
  if(!staffObj) { alert("Please enter a valid Staff ID."); return; }
  if(!window.coords) { alert("Please verify your location first."); return; }
  if(!window.photo) { alert("Please take a selfie first."); return; }

  const action = staffObj.status === 'Clock In' ? 'Clock Out' : 'Clock In';
  const payload = { name: staffObj.name, id: staffObj.id, branch: branch, action: action, image: window.photo, lat: window.coords.latitude, lng: window.coords.longitude };
  
  const btn = document.getElementById('attSubmitBtn');
  btn.disabled = true; btn.innerText = 'Sending...';

  fetch(ATTENDANCE_SCRIPT_URL, { method:'POST', body:JSON.stringify({action:'recordAttendance', data:payload, terminal:activeStore.toLowerCase()}) })
  .then(r => r.json()).then(res => {
    if(!res.ok) throw new Error(res.error);
    document.getElementById('mainForm').style.display = 'none';
    document.getElementById('attSuccessBadge').innerText = action.toUpperCase();
    document.getElementById('attSuccessName').innerText = staffObj.name + " log recorded.";
    document.getElementById('attSuccessScreen').classList.add('active');
  }).catch(err => {
    alert("Error saving attendance: " + err.message);
  }).finally(() => {
    btn.disabled = false; btn.innerText = 'Submit Attendance';
  });
}
